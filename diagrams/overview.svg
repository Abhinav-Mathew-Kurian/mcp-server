<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arrowGray" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#34d399"/>
    </marker>
    <marker id="arrowPurple" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#a78bfa"/>
    </marker>
    <marker id="arrowBlue" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#38bdf8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="bold">Corti ZK De-identification Agent — System Architecture</text>
  <text x="600" y="62" text-anchor="middle" fill="#475569" font-size="12">Two entry points · One shared pipeline · PHI never leaves local machine unencrypted</text>

  <!-- ===== FLOW A ENTRY ===== -->
  <rect x="30" y="86" width="310" height="164" rx="12" fill="#1e1035" stroke="#7c3aed" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="185" y="108" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">FLOW A — CORTI WEB UI</text>
  <text x="185" y="124" text-anchor="middle" fill="#6d28d9" font-size="10">Port 3456 via ngrok tunnel</text>

  <rect x="46" y="134" width="120" height="48" rx="7" fill="#3b0764" stroke="#7c3aed" stroke-width="1"/>
  <text x="106" y="153" text-anchor="middle" fill="#ddd6fe" font-size="11" font-weight="bold">Corti Browser</text>
  <text x="106" y="167" text-anchor="middle" fill="#a78bfa" font-size="9">console.corti.ai</text>
  <text x="106" y="179" text-anchor="middle" fill="#7c3aed" font-size="9">paste clinical note</text>

  <line x1="166" y1="158" x2="195" y2="158" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <text x="181" y="152" text-anchor="middle" fill="#6d28d9" font-size="8">HTTPS</text>

  <rect x="197" y="134" width="86" height="48" rx="7" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="240" y="153" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="bold">ngrok</text>
  <text x="240" y="167" text-anchor="middle" fill="#818cf8" font-size="9">tunnel</text>
  <text x="240" y="179" text-anchor="middle" fill="#4f46e5" font-size="9">:3456</text>

  <text x="185" y="215" text-anchor="middle" fill="#6d28d9" font-size="9">MCP tools/call → run_pipeline</text>
  <text x="185" y="229" text-anchor="middle" fill="#5b21b6" font-size="9">Corti LLM decides to call expert tool</text>
  <text x="185" y="244" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="bold">Result rendered back in Corti chat</text>

  <!-- ===== FLOW B ENTRY ===== -->
  <rect x="862" y="86" width="310" height="164" rx="12" fill="#0c2341" stroke="#0369a1" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="1017" y="108" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="bold">FLOW B — BATCH FRONTEND</text>
  <text x="1017" y="124" text-anchor="middle" fill="#075985" font-size="10">Port 3457 direct HTTP</text>

  <rect x="878" y="134" width="122" height="48" rx="7" fill="#0c4a6e" stroke="#0369a1" stroke-width="1"/>
  <text x="939" y="153" text-anchor="middle" fill="#bae6fd" font-size="11" font-weight="bold">React Frontend</text>
  <text x="939" y="167" text-anchor="middle" fill="#38bdf8" font-size="9">Vite + Tailwind</text>
  <text x="939" y="179" text-anchor="middle" fill="#0369a1" font-size="9">:5173</text>

  <line x1="1000" y1="158" x2="1028" y2="158" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="1014" y="152" text-anchor="middle" fill="#075985" font-size="8">HTTP</text>

  <rect x="1030" y="134" width="86" height="48" rx="7" fill="#0a1628" stroke="#0284c7" stroke-width="1"/>
  <text x="1073" y="153" text-anchor="middle" fill="#bae6fd" font-size="11" font-weight="bold">REST API</text>
  <text x="1073" y="167" text-anchor="middle" fill="#38bdf8" font-size="9">Express</text>
  <text x="1073" y="179" text-anchor="middle" fill="#0369a1" font-size="9">:3457</text>

  <text x="1017" y="215" text-anchor="middle" fill="#075985" font-size="9">POST /api/upload · POST /api/batch</text>
  <text x="1017" y="229" text-anchor="middle" fill="#075985" font-size="9">GET /api/batch/:id · zip download</text>
  <text x="1017" y="244" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="bold">Results table + ZIP in browser</text>

  <!-- ===== ARROWS DOWN TO PIPELINE ===== -->
  <line x1="310" y1="192" x2="380" y2="290" stroke="#a78bfa" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>
  <text x="318" y="258" fill="#7c3aed" font-size="9" transform="rotate(-50,318,258)">MCP call</text>

  <line x1="892" y1="192" x2="820" y2="290" stroke="#38bdf8" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <text x="878" y="258" fill="#0369a1" font-size="9" transform="rotate(50,878,258)">REST call</text>

  <!-- ===== PIPELINE CORE ===== -->
  <rect x="200" y="290" width="800" height="390" rx="16" fill="#071a12" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="316" text-anchor="middle" fill="#34d399" font-size="15" font-weight="bold">PIPELINE CORE — runs entirely on your local machine</text>
  <text x="600" y="334" text-anchor="middle" fill="#065f46" font-size="10">phiDetector.ts  ·  deidentifier.ts  ·  factsExtractor.ts  ·  zkRunner.ts  ·  batchProcessor.ts</text>

  <!-- Column 1: PHI Detection -->
  <rect x="220" y="346" width="222" height="214" rx="10" fill="#022c22" stroke="#065f46" stroke-width="1.2"/>
  <text x="331" y="367" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="bold">PHI DETECTION</text>
  <text x="331" y="381" text-anchor="middle" fill="#059669" font-size="9">3-layer local detection</text>

  <rect x="232" y="390" width="198" height="24" rx="5" fill="#064e3b" stroke="#10b981" stroke-width="0.8"/>
  <text x="331" y="407" text-anchor="middle" fill="#a7f3d0" font-size="10">Layer 1 · Regex — 17 patterns</text>

  <rect x="232" y="420" width="198" height="24" rx="5" fill="#064e3b" stroke="#10b981" stroke-width="0.8"/>
  <text x="331" y="437" text-anchor="middle" fill="#a7f3d0" font-size="10">fixMojibake · strip markdown bold</text>

  <rect x="232" y="450" width="198" height="24" rx="5" fill="#064e3b" stroke="#10b981" stroke-width="0.8"/>
  <text x="331" y="467" text-anchor="middle" fill="#a7f3d0" font-size="10">Layer 2 · NER (compromise.js)</text>

  <rect x="232" y="480" width="198" height="24" rx="5" fill="#064e3b" stroke="#10b981" stroke-width="0.8"/>
  <text x="331" y="497" text-anchor="middle" fill="#a7f3d0" font-size="10">Component expansion</text>

  <rect x="232" y="510" width="198" height="24" rx="5" fill="#064e3b" stroke="#10b981" stroke-width="0.8"/>
  <text x="331" y="527" text-anchor="middle" fill="#a7f3d0" font-size="10">Layer 3 · Consistency pass</text>

  <rect x="232" y="540" width="198" height="30" rx="5" fill="#065f46" stroke="#34d399" stroke-width="1.2"/>
  <text x="331" y="557" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">Redact → Codenames</text>
  <text x="331" y="570" text-anchor="middle" fill="#6ee7b7" font-size="9">PHI → &lt;&lt;NOVA-1D12&gt;&gt;</text>

  <!-- Arrow col1 → col2 -->
  <line x1="442" y1="453" x2="462" y2="453" stroke="#34d399" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Column 2: Encryption + Storage -->
  <rect x="464" y="346" width="270" height="214" rx="10" fill="#150d2e" stroke="#6d28d9" stroke-width="1.2"/>
  <text x="599" y="367" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="bold">ENCRYPTION + STORAGE</text>
  <text x="599" y="381" text-anchor="middle" fill="#5b21b6" font-size="9">AES-256-GCM · per-run 256-bit key</text>

  <rect x="476" y="390" width="246" height="36" rx="5" fill="#2d1b69" stroke="#6d28d9" stroke-width="0.8"/>
  <text x="599" y="407" text-anchor="middle" fill="#ddd6fe" font-size="11" font-weight="bold">phi_map.enc</text>
  <text x="599" y="420" text-anchor="middle" fill="#a78bfa" font-size="9">encrypted PHI map (AES-256-GCM)</text>

  <rect x="476" y="432" width="118" height="28" rx="5" fill="#2d1b69" stroke="#5b21b6" stroke-width="0.8"/>
  <text x="535" y="447" text-anchor="middle" fill="#ddd6fe" font-size="9" font-weight="bold">patient_key.b64</text>
  <text x="535" y="459" text-anchor="middle" fill="#a78bfa" font-size="8">256-bit key (separate)</text>

  <rect x="600" y="432" width="122" height="28" rx="5" fill="#14532d" stroke="#15803d" stroke-width="0.8"/>
  <text x="661" y="447" text-anchor="middle" fill="#bbf7d0" font-size="9" font-weight="bold">anonymized.txt</text>
  <text x="661" y="459" text-anchor="middle" fill="#86efac" font-size="8">safe to share</text>

  <rect x="476" y="466" width="86" height="24" rx="5" fill="#1c1917" stroke="#92400e" stroke-width="0.8"/>
  <text x="519" y="483" text-anchor="middle" fill="#fde68a" font-size="9">proof.json</text>

  <rect x="566" y="466" width="78" height="24" rx="5" fill="#1c1917" stroke="#92400e" stroke-width="0.8"/>
  <text x="605" y="483" text-anchor="middle" fill="#fde68a" font-size="9">public_signals</text>

  <rect x="648" y="466" width="78" height="24" rx="5" fill="#1c1917" stroke="#92400e" stroke-width="0.8"/>
  <text x="687" y="483" text-anchor="middle" fill="#fde68a" font-size="9">zk_summary</text>

  <rect x="476" y="496" width="246" height="54" rx="5" fill="#0f172a" stroke="#1e293b" stroke-width="0.8"/>
  <text x="599" y="514" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="bold">output/&lt;batchId&gt;/&lt;noteId&gt;/</text>
  <text x="599" y="528" text-anchor="middle" fill="#475569" font-size="9">facts.json · commitment.json</text>
  <text x="599" y="540" text-anchor="middle" fill="#475569" font-size="9">batch_summary.json · batch_report.txt</text>

  <!-- Arrow col2 → col3 (sends anon text to Corti) -->
  <line x1="734" y1="453" x2="754" y2="453" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="744" y="443" text-anchor="middle" fill="#475569" font-size="8">anon</text>

  <!-- Column 3: Facts + ZK -->
  <rect x="756" y="346" width="222" height="214" rx="10" fill="#1a1007" stroke="#b45309" stroke-width="1.2"/>
  <text x="867" y="367" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="bold">FACTS + ZK PROOF</text>
  <text x="867" y="381" text-anchor="middle" fill="#b45309" font-size="9">only anonymized text sent to LLM</text>

  <rect x="768" y="390" width="198" height="40" rx="5" fill="#1a1a2e" stroke="#4f46e5" stroke-width="0.8"/>
  <text x="867" y="408" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="bold">Corti LLM</text>
  <text x="867" y="421" text-anchor="middle" fill="#818cf8" font-size="8">diagnoses · vitals · meds · age</text>

  <rect x="768" y="436" width="198" height="24" rx="5" fill="#1a1007" stroke="#78350f" stroke-width="0.8"/>
  <text x="867" y="453" text-anchor="middle" fill="#fde68a" font-size="10">ICD-10 chapter classification</text>

  <rect x="768" y="466" width="198" height="24" rx="5" fill="#1a1007" stroke="#78350f" stroke-width="0.8"/>
  <text x="867" y="483" text-anchor="middle" fill="#fde68a" font-size="10">age bracket (floor / 10 * 10)</text>

  <rect x="768" y="496" width="198" height="54" rx="5" fill="#111204" stroke="#ca8a04" stroke-width="1.2"/>
  <text x="867" y="516" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="bold">ZK Proof — Groth16</text>
  <text x="867" y="530" text-anchor="middle" fill="#fbbf24" font-size="9">279 constraints · BN128 curve</text>
  <text x="867" y="543" text-anchor="middle" fill="#fbbf24" font-size="9">age range + ICD · locally verified ✓</text>

  <!-- ===== RETURN ARROWS ===== -->
  <path d="M 331 560 L 331 610 L 185 610 L 185 252" stroke="#a78bfa" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>
  <text x="244" y="628" text-anchor="middle" fill="#7c3aed" font-size="9">JSON bundle returned to Corti LLM</text>

  <path d="M 867 560 L 867 610 L 1017 610 L 1017 252" stroke="#38bdf8" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <text x="934" y="628" text-anchor="middle" fill="#0369a1" font-size="9">poll returns done → results table</text>

  <!-- ===== SECURITY BANNER ===== -->
  <rect x="200" y="698" width="800" height="46" rx="8" fill="#071a12" stroke="#166534" stroke-width="1.2"/>
  <text x="600" y="718" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">Security guarantee</text>
  <text x="600" y="735" text-anchor="middle" fill="#16a34a" font-size="10">All 3 PHI detection layers run locally · Only &lt;&lt;CODENAMES&gt;&gt; sent to Corti LLM · AES-256-GCM at rest · ZK proof reveals only age band + ICD chapter</text>

  <!-- ===== LEGEND ===== -->
  <rect x="30" y="698" width="158" height="46" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="109" y="716" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="bold">Ports</text>
  <circle cx="44" cy="728" r="4" fill="#a78bfa"/>
  <text x="54" y="732" fill="#a78bfa" font-size="10">:3456 MCP</text>
  <circle cx="44" cy="742" r="4" fill="#38bdf8"/>
  <text x="54" y="746" fill="#38bdf8" font-size="10">:3457 REST</text>
  <circle cx="118" cy="728" r="4" fill="#34d399"/>
  <text x="128" y="732" fill="#34d399" font-size="10">:5173 UI</text>

  <!-- ===== TECH LEGEND ===== -->
  <rect x="1014" y="698" width="158" height="46" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="1093" y="716" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="bold">Libraries</text>
  <text x="1022" y="730" fill="#a7f3d0" font-size="9">compromise.js</text>
  <text x="1022" y="742" fill="#475569" font-size="8">offline NER</text>
  <text x="1092" y="730" fill="#fcd34d" font-size="9">snarkjs</text>
  <text x="1092" y="742" fill="#475569" font-size="8">Groth16 ZK</text>
  <text x="1150" y="730" fill="#bae6fd" font-size="9">multer</text>
  <text x="1145" y="742" fill="#475569" font-size="8">file upload</text>
</svg>