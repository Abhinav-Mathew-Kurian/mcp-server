<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="1020" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0c2040"/>
    </linearGradient>
    <marker id="arr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#38bdf8"/>
    </marker>
    <marker id="arrG" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#34d399"/>
    </marker>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="1100" height="1020" fill="url(#bg)"/>

  <text x="550" y="38" text-anchor="middle" fill="#bae6fd" font-size="19" font-weight="bold">Flow B — Batch Frontend UI · Step-by-Step</text>
  <text x="550" y="58" text-anchor="middle" fill="#075985" font-size="11">Drop PDF/DOCX/TXT into browser → REST API → batch pipeline → results table + zip download</text>

  <!-- B1 -->
  <rect x="60" y="74" width="980" height="58" rx="9" fill="#0c2341" stroke="#0369a1" stroke-width="1.4" filter="url(#sh)"/>
  <circle cx="98" cy="103" r="14" fill="#0369a1"/>
  <text x="98" y="108" text-anchor="middle" fill="white" font-size="12" font-weight="bold">B1</text>
  <text x="126" y="96" fill="#bae6fd" font-size="12" font-weight="bold">Open frontend at localhost:5173 (React + Vite + Tailwind)</text>
  <text x="126" y="112" fill="#0369a1" font-size="10">On mount: frontend hits GET /health on REST API (:3457) → green "API ready" dot shown. Drop zone, text boxes, Run Batch button rendered.</text>

  <!-- B2 -->
  <rect x="60" y="146" width="980" height="82" rx="9" fill="#0c2341" stroke="#0284c7" stroke-width="1.4" filter="url(#sh)"/>
  <circle cx="98" cy="187" r="14" fill="#0284c7"/>
  <text x="98" y="192" text-anchor="middle" fill="white" font-size="12" font-weight="bold">B2</text>
  <text x="126" y="166" fill="#bae6fd" font-size="12" font-weight="bold">Drop PDF/DOCX/TXT files onto drop zone (or click to browse)</text>
  <text x="126" y="182" fill="#38bdf8" font-size="10">handleDrop() checks extensions: .pdf/.docx/.txt/.md allowed · isBinary() check: .pdf/.docx → file upload mode</text>
  <text x="126" y="198" fill="#0369a1" font-size="10">Binary files (.pdf/.docx) → mode = "files" → file queue panel shows with name + size + remove button</text>
  <text x="126" y="213" fill="#075985" font-size="10">Text files (.txt/.md) → mode = "text" → FileReader reads locally → shown in editable text boxes</text>

  <!-- B3 -->
  <rect x="60" y="242" width="980" height="58" rx="9" fill="#0c2341" stroke="#0284c7" stroke-width="1.4" filter="url(#sh)"/>
  <circle cx="98" cy="271" r="14" fill="#0284c7"/>
  <text x="98" y="276" text-anchor="middle" fill="white" font-size="12" font-weight="bold">B3</text>
  <text x="126" y="262" fill="#bae6fd" font-size="12" font-weight="bold">Click "Run Batch →" — submitBatch() fires</text>
  <text x="126" y="278" fill="#0369a1" font-size="10">Mode="files": builds FormData, appends all File objects → POST /api/upload (multipart/form-data, binary payload)</text>
  <text x="126" y="292" fill="#075985" font-size="10">Mode="text": builds {notes:[{id,text}]} JSON array → POST /api/batch. UI transitions to spinner (running state).</text>

  <!-- B4 -->
  <rect x="60" y="314" width="980" height="82" rx="9" fill="#0a1e10" stroke="#15803d" stroke-width="1.4" filter="url(#sh)"/>
  <circle cx="98" cy="355" r="14" fill="#15803d"/>
  <text x="98" y="360" text-anchor="middle" fill="white" font-size="12" font-weight="bold">B4</text>
  <text x="126" y="330" fill="#bbf7d0" font-size="12" font-weight="bold">REST API receives upload (src/api.ts → POST /api/upload)</text>
  <text x="126" y="346" fill="#34d399" font-size="10">multer middleware intercepts multipart: memoryStorage, 20MB/file, 20 files max, filter .pdf/.docx/.txt/.md</text>
  <text x="126" y="361" fill="#15803d" font-size="10">For each file: write buffer to output/.tmp_uploads/&lt;hex&gt;.ext → parseFileToText(tmpPath) → delete temp file → add {id, text} to notes[]</text>
  <text x="126" y="376" fill="#065f46" font-size="10">Parse errors isolated per file. Job registered in memory store as "running". HTTP 202 returned immediately with jobId. Batch starts async.</text>

  <!-- B5 -->
  <rect x="60" y="410" width="980" height="70" rx="9" fill="#0a1e10" stroke="#15803d" stroke-width="1.4" filter="url(#sh)"/>
  <circle cx="98" cy="445" r="14" fill="#15803d"/>
  <text x="98" y="450" text-anchor="middle" fill="white" font-size="12" font-weight="bold">B5</text>
  <text x="126" y="428" fill="#bbf7d0" font-size="12" font-weight="bold">File Parser converts binary to plain text (src/fileParser.ts → parseFileToText)</text>
  <text x="126" y="444" fill="#34d399" font-size="10">.pdf → pdf-parse: Buffer → text (layout, headers, values all preserved as-is)</text>
  <text x="126" y="460" fill="#15803d" font-size="10">.docx → mammoth: extractRawText() · .txt/.md → fs.readFileSync utf-8 · Extracted text identical structure to manual paste</text>

  <!-- B6 -->
  <rect x="60" y="494" width="980" height="58" rx="9" fill="#0c2341" stroke="#0369a1" stroke-width="1.4" filter="url(#sh)"/>
  <circle cx="98" cy="523" r="14" fill="#0369a1"/>
  <text x="98" y="528" text-anchor="middle" fill="white" font-size="12" font-weight="bold">B6</text>
  <text x="126" y="514" fill="#bae6fd" font-size="12" font-weight="bold">Frontend polls GET /api/batch/:jobId every 2 seconds</text>
  <text x="126" y="530" fill="#0369a1" font-size="10">While status="running" → spinner stays. startPolling() sets interval, clears on done/failed/unmount. Prevents memory leaks via pollRef.</text>

  <!-- B7 -->
  <rect x="60" y="566" width="980" height="82" rx="9" fill="#0a1e10" stroke="#059669" stroke-width="1.4" filter="url(#sh)"/>
  <circle cx="98" cy="607" r="14" fill="#059669"/>
  <text x="98" y="612" text-anchor="middle" fill="white" font-size="12" font-weight="bold">B7</text>
  <text x="126" y="582" fill="#6ee7b7" font-size="12" font-weight="bold">Batch Processor runs full pipeline per note (src/batchProcessor.ts → runBatch)</text>
  <text x="126" y="598" fill="#34d399" font-size="10">p-limit concurrency=3: max 3 notes processed simultaneously → prevents Corti API rate limiting</text>
  <text x="126" y="614" fill="#059669" font-size="10">Per note: deidentify() [Layers 1-2-3 + codenames + AES encrypt] → generateProof() [ICD classify + ZK prove] → write output files</text>
  <text x="126" y="630" fill="#065f46" font-size="10">Per-note error isolation: if one note throws, it is marked failed, rest continue. All same pipeline steps as Flow A.</text>

  <!-- B8 -->
  <rect x="60" y="662" width="980" height="58" rx="9" fill="#0a1e10" stroke="#059669" stroke-width="1.4" filter="url(#sh)"/>
  <circle cx="98" cy="691" r="14" fill="#059669"/>
  <text x="98" y="696" text-anchor="middle" fill="white" font-size="12" font-weight="bold">B8</text>
  <text x="126" y="680" fill="#6ee7b7" font-size="12" font-weight="bold">Batch summary generated → job marked "done"</text>
  <text x="126" y="696" fill="#34d399" font-size="10">BatchResult: totalNotes, succeeded, failed, durationMs, icdDistribution, totalPhiTokens, per-note results</text>
  <text x="126" y="712" fill="#065f46" font-size="10">Written: batch_summary.json + batch_report.txt in output/&lt;batchId&gt;/. Job store updated to status="done".</text>

  <!-- B9 -->
  <rect x="60" y="734" width="980" height="58" rx="9" fill="#0c2341" stroke="#0369a1" stroke-width="1.4" filter="url(#sh)"/>
  <circle cx="98" cy="763" r="14" fill="#0369a1"/>
  <text x="98" y="768" text-anchor="middle" fill="white" font-size="12" font-weight="bold">B9</text>
  <text x="126" y="752" fill="#bae6fd" font-size="12" font-weight="bold">Poll returns status="done" → frontend transitions from spinner to results view</text>
  <text x="126" y="768" fill="#38bdf8" font-size="10">GET /api/batch/:jobId returns full BatchResult. anonymizedText stripped from summary (large). Fetched per-note on expand.</text>

  <!-- B10 -->
  <rect x="60" y="806" width="980" height="100" rx="9" fill="#0c2341" stroke="#0284c7" stroke-width="1.4" filter="url(#sh)"/>
  <circle cx="98" cy="856" r="14" fill="#0284c7"/>
  <text x="98" y="861" text-anchor="middle" fill="white" font-size="12" font-weight="bold">B10</text>
  <text x="126" y="824" fill="#bae6fd" font-size="12" font-weight="bold">Results rendered in browser</text>
  <text x="126" y="840" fill="#38bdf8" font-size="10">Summary cards: Notes Processed · Succeeded · PHI Tokens Removed · Runtime</text>
  <text x="126" y="856" fill="#0369a1" font-size="10">ICD distribution pills. Results table: one row per note with ✓/✗ · ICD chapter · age range · ZK ✓ · PHI count · runtime · expand ▼</text>
  <text x="126" y="872" fill="#075985" font-size="10">Expand row → GET /api/batch/:id/note/:noteId → diagnoses + meds + ZK panel + full anonymized text</text>
  <text x="126" y="888" fill="#0c4a6e" font-size="10">Download button → GET /api/batch/:id/download → archiver streams entire output dir as ZIP → browser file download</text>

  <!-- vertical indicator -->
  <line x1="42" y1="103" x2="42" y2="906" stroke="#0c2d5e" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="42" y1="140" x2="42" y2="146" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="42" y1="234" x2="42" y2="242" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="42" y1="308" x2="42" y2="314" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="42" y1="404" x2="42" y2="410" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="42" y1="488" x2="42" y2="494" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="42" y1="560" x2="42" y2="566" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="42" y1="656" x2="42" y2="662" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="42" y1="728" x2="42" y2="734" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="42" y1="800" x2="42" y2="806" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- output files -->
  <rect x="60" y="922" width="980" height="82" rx="9" fill="#111820" stroke="#334155" stroke-width="1" filter="url(#sh)"/>
  <text x="550" y="942" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">Output files written per note (output/&lt;batchId&gt;/&lt;noteId&gt;/)</text>
  <rect x="74" y="950" width="128" height="24" rx="5" fill="#1a1a2e" stroke="#4f46e5" stroke-width="0.8"/>
  <text x="138" y="967" text-anchor="middle" fill="#c7d2fe" font-size="9">anonymized.txt</text>
  <rect x="210" y="950" width="128" height="24" rx="5" fill="#1a1a2e" stroke="#4f46e5" stroke-width="0.8"/>
  <text x="274" y="967" text-anchor="middle" fill="#c7d2fe" font-size="9">facts.json</text>
  <rect x="346" y="950" width="128" height="24" rx="5" fill="#1a1a2e" stroke="#4f46e5" stroke-width="0.8"/>
  <text x="410" y="967" text-anchor="middle" fill="#c7d2fe" font-size="9">phi_map.enc</text>
  <rect x="482" y="950" width="128" height="24" rx="5" fill="#1a1a2e" stroke="#4f46e5" stroke-width="0.8"/>
  <text x="546" y="967" text-anchor="middle" fill="#c7d2fe" font-size="9">patient_key.b64</text>
  <rect x="618" y="950" width="128" height="24" rx="5" fill="#1a1a2e" stroke="#4f46e5" stroke-width="0.8"/>
  <text x="682" y="967" text-anchor="middle" fill="#c7d2fe" font-size="9">proof.json</text>
  <rect x="754" y="950" width="128" height="24" rx="5" fill="#1a1a2e" stroke="#4f46e5" stroke-width="0.8"/>
  <text x="818" y="967" text-anchor="middle" fill="#c7d2fe" font-size="9">public_signals.json</text>
  <rect x="890" y="950" width="136" height="24" rx="5" fill="#1a1a2e" stroke="#4f46e5" stroke-width="0.8"/>
  <text x="958" y="967" text-anchor="middle" fill="#c7d2fe" font-size="9">zk_summary.json</text>
  <text x="550" y="996" text-anchor="middle" fill="#475569" font-size="9">batch_summary.json + batch_report.txt at batchId root · all files included in ZIP download</text>
</svg>